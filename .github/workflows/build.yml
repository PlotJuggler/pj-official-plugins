name: build

on:
  workflow_dispatch:
  push:
    tags: ['*/v*']
  schedule:
    # Keep Conan cache warm — runs weekly (cache expires after 7 days of no access)
    - cron: '0 3 * * 1'  # Monday 3am UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            arch: x86_64
            os_label: linux
            lib_ext: so
          - runner: ubuntu-22.04-arm
            arch: aarch64
            os_label: linux
            lib_ext: so
          - runner: macos-15-intel
            arch: x86_64
            os_label: macos
            lib_ext: dylib
          - runner: macos-14
            arch: arm64
            os_label: macos
            lib_ext: dylib
          - runner: windows-latest
            arch: x64
            os_label: windows
            lib_ext: dll
          - runner: windows-11-arm
            arch: arm64
            os_label: windows
            lib_ext: dll

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH for private dependencies
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CORE_DEPLOY_KEY }}

      - name: Install Conan
        uses: conan-io/setup-conan@v1.3.0
        with:
          cache_packages: true

      - name: Install cmake and ninja
        run: pip install cmake ninja

      - name: Set up MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build & Test
        shell: bash
        run: |
          conan install . --output-folder=build --build=missing -s build_type=Release \
            -s compiler.cppstd=20 -c tools.cmake.cmaketoolchain:generator=Ninja

          # When triggered by a tag (e.g. data_load_csv/v0.1.0), build only that plugin
          CMAKE_EXTRA_ARGS=""
          if [[ "${GITHUB_REF_NAME:-}" == */* ]]; then
            PLUGIN_NAME="${GITHUB_REF_NAME%/*}"
            CMAKE_EXTRA_ARGS="-DPJ_BUILD_PLUGIN=${PLUGIN_NAME}"
            echo "Building single plugin: ${PLUGIN_NAME}"
          fi

          cmake -S . -B build/Release -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=build/conan_toolchain.cmake \
            -DCMAKE_PREFIX_PATH=build \
            -DCMAKE_BUILD_TYPE=Release \
            ${CMAKE_EXTRA_ARGS}
          cmake --build build/Release --config Release
          ctest --test-dir build/Release -V --output-on-failure

      # Plugin directory name → .so target name mapping:
      #   data_load_csv       → csv_source_plugin
      #   data_load_mcap      → mcap_source_plugin
      #   data_load_parquet   → parquet_source_plugin
      #   data_load_ulog      → ulog_source_plugin
      #   data_stream_foxglove_bridge → foxglove_source_plugin
      #   data_stream_mqtt    → mqtt_source_plugin
      #   data_stream_pj_bridge → pj_bridge_source_plugin
      #   data_stream_zmq     → zmq_source_plugin
      #   parser_data_tamer   → parser_data_tamer_plugin
      #   parser_json         → parser_json_plugin
      #   parser_protobuf     → parser_protobuf_plugin
      #   parser_ros          → parser_ros_plugin
      - name: Package artifacts
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          EXT_NAME="${{ github.ref_name }}"
          EXT_NAME="${EXT_NAME%/*}"
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION##*/}"
          VERSION="${VERSION#v}"
          ZIP_NAME="${EXT_NAME}-${VERSION}-${{ matrix.os_label }}-${{ matrix.arch }}.zip"

          mkdir -p "dist/${EXT_NAME}"

          # Map plugin directory name to target name pattern (no associative arrays — macOS has bash 3)
          case "${EXT_NAME}" in
            data_load_csv)                TARGET_PATTERN=csv_source ;;
            data_load_mcap)               TARGET_PATTERN=mcap_source ;;
            data_load_parquet)            TARGET_PATTERN=parquet_source ;;
            data_load_ulog)               TARGET_PATTERN=ulog_source ;;
            data_stream_foxglove_bridge)  TARGET_PATTERN=foxglove_source ;;
            data_stream_mqtt)             TARGET_PATTERN=mqtt_source ;;
            data_stream_pj_bridge)        TARGET_PATTERN=pj_bridge_source ;;
            data_stream_zmq)              TARGET_PATTERN=zmq_source ;;
            data_stream_dummy)            TARGET_PATTERN=dummy_stream ;;
            parser_*)                     TARGET_PATTERN="${EXT_NAME}" ;;
            *)                            TARGET_PATTERN="${EXT_NAME}" ;;
          esac

          # Search everywhere under build/Release for the plugin binary
          find build/Release -name "*${TARGET_PATTERN}*.${{ matrix.lib_ext }}" \
            -exec cp {} "dist/${EXT_NAME}/" \; 2>/dev/null || true

          ls -la "dist/${EXT_NAME}/"
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV

      - name: Compress artifacts (Linux/macOS)
        if: startsWith(github.ref, 'refs/tags/') && runner.os != 'Windows'
        shell: bash
        run: cd dist && zip -r "../${{ env.ZIP_NAME }}" .

      - name: Compress artifacts (Windows)
        if: startsWith(github.ref, 'refs/tags/') && runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist\* -DestinationPath "$env:ZIP_NAME"
          Write-Host "Package created: $env:ZIP_NAME"

      - name: Generate checksum (Linux/macOS)
        if: startsWith(github.ref, 'refs/tags/') && runner.os != 'Windows'
        shell: bash
        run: |
          if command -v sha256sum &> /dev/null; then
            sha256sum "${{ env.ZIP_NAME }}" > "${{ env.ZIP_NAME }}.sha256"
          else
            shasum -a 256 "${{ env.ZIP_NAME }}" > "${{ env.ZIP_NAME }}.sha256"
          fi
          cat "${{ env.ZIP_NAME }}.sha256"

      - name: Generate checksum (Windows)
        if: startsWith(github.ref, 'refs/tags/') && runner.os == 'Windows'
        shell: pwsh
        run: |
          $hash = (Get-FileHash -Algorithm SHA256 "$env:ZIP_NAME").Hash.ToLower()
          "$hash  $env:ZIP_NAME" | Out-File -Encoding ascii "$env:ZIP_NAME.sha256"
          Get-Content "$env:ZIP_NAME.sha256"

      - name: Upload artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_NAME }}

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ZIP_NAME }}
            ${{ env.ZIP_NAME }}.sha256
          generate_release_notes: ${{ matrix.runner == 'ubuntu-22.04' }}
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
