name: Build & Release

on:
  workflow_dispatch:
  push:
    tags: ['*/v*']
  schedule:
    # Keep Conan cache warm — runs weekly (cache expires after 7 days of no access)
    - cron: '0 3 * * 1'  # Monday 3am UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            arch: x86_64
            os_label: linux
            lib_ext: so
          - runner: ubuntu-22.04-arm
            arch: aarch64
            os_label: linux
            lib_ext: so
          - runner: macos-15-intel
            arch: x86_64
            os_label: macos
            lib_ext: dylib
          - runner: macos-14
            arch: arm64
            os_label: macos
            lib_ext: dylib
          - runner: windows-latest
            arch: x64
            os_label: windows
            lib_ext: dll
          - runner: windows-11-arm
            arch: arm64
            os_label: windows
            lib_ext: dll

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH for private dependencies
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CORE_DEPLOY_KEY }}

      - name: Add GitHub to SSH known hosts
        shell: bash
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null

      - name: Install Conan
        uses: conan-io/setup-conan@v1.3.0
        with:
          cache_packages: true

      - name: Install cmake and ninja
        run: pip install cmake ninja

      - name: Set up MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Build & Test
        shell: bash
        run: |
          conan profile detect --force
          conan install . --output-folder=build --build=missing -s build_type=Release \
            -s compiler.cppstd=20 -c tools.cmake.cmaketoolchain:generator=Ninja

          # When triggered by a tag (e.g. data_load_csv/v0.1.0), build only that plugin
          CMAKE_EXTRA_ARGS=""
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" && "${GITHUB_REF_NAME:-}" == */* ]]; then
            PLUGIN_NAME="${GITHUB_REF_NAME%/*}"
            CMAKE_EXTRA_ARGS="-DPJ_BUILD_PLUGIN=${PLUGIN_NAME}"
            echo "Building single plugin: ${PLUGIN_NAME}"
          fi

          cmake -S . -B build/Release -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=build/conan_toolchain.cmake \
            -DCMAKE_PREFIX_PATH=build \
            -DCMAKE_BUILD_TYPE=Release \
            ${CMAKE_EXTRA_ARGS}
          cmake --build build/Release --config Release
          ctest --test-dir build/Release -V --output-on-failure

      - name: Verify plugin version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          python3 scripts/release_tools.py verify-version-consistency \
            --release-tag "${{ github.ref_name }}" \
            --build-dir build/Release \
            --check-manifest

      - name: Package artifacts
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          ZIP_NAME=$(python3 scripts/release_tools.py create-distribution-package \
            --release-tag "${{ github.ref_name }}" \
            --build-dir build/Release \
            --output-dir dist \
            --os-label "${{ matrix.os_label }}" \
            --arch "${{ matrix.arch }}")

          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV

      - name: Compress artifacts (Linux/macOS)
        if: startsWith(github.ref, 'refs/tags/') && runner.os != 'Windows'
        shell: bash
        run: cd dist && zip -r "../${{ env.ZIP_NAME }}" .

      - name: Compress artifacts (Windows)
        if: startsWith(github.ref, 'refs/tags/') && runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist\* -DestinationPath "$env:ZIP_NAME"
          Write-Host "Package created: $env:ZIP_NAME"

      - name: Generate checksum (Linux/macOS)
        if: startsWith(github.ref, 'refs/tags/') && runner.os != 'Windows'
        shell: bash
        run: |
          if command -v sha256sum &> /dev/null; then
            sha256sum "${{ env.ZIP_NAME }}" > "${{ env.ZIP_NAME }}.sha256"
          else
            shasum -a 256 "${{ env.ZIP_NAME }}" > "${{ env.ZIP_NAME }}.sha256"
          fi
          cat "${{ env.ZIP_NAME }}.sha256"

      - name: Generate checksum (Windows)
        if: startsWith(github.ref, 'refs/tags/') && runner.os == 'Windows'
        shell: pwsh
        run: |
          $hash = (Get-FileHash -Algorithm SHA256 "$env:ZIP_NAME").Hash.ToLower()
          "$hash  $env:ZIP_NAME" | Out-File -Encoding ascii "$env:ZIP_NAME.sha256"
          Get-Content "$env:ZIP_NAME.sha256"

      - name: Upload artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_NAME }}

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ZIP_NAME }}
            ${{ env.ZIP_NAME }}.sha256
          generate_release_notes: ${{ matrix.runner == 'ubuntu-22.04' }}
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Submit to registry if tag metadata requests it
  submit-to-registry:
    needs: build
    if: success() && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for tag annotations

      - name: Check tag metadata
        id: check-tag
        run: |
          # Get tag annotation message (contains JSON metadata)
          TAG_MSG=$(git tag -l --format='%(contents)' "${{ github.ref_name }}" 2>/dev/null || echo "{}")
          echo "Tag message: $TAG_MSG"

          # Parse auto_submit_to_registry from JSON
          AUTO_SUBMIT=$(echo "$TAG_MSG" | python3 -c "import sys,json; d=json.loads(sys.stdin.read() or '{}'); print(str(d.get('auto_submit_to_registry', False)).lower())")
          echo "auto_submit=$AUTO_SUBMIT" >> $GITHUB_OUTPUT
          echo "Auto-submit to registry: $AUTO_SUBMIT"

      - name: Setup Python
        if: steps.check-tag.outputs.auto_submit == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.check-tag.outputs.auto_submit == 'true'
        run: pip install GitPython

      - name: Submit to registry
        if: steps.check-tag.outputs.auto_submit == 'true'
        env:
          GH_TOKEN: ${{ secrets.REGISTRY_PAT }}
        run: |
          # Extract source_dir from tag (data_load_csv/v1.0.5 -> data_load_csv)
          SOURCE_DIR="${GITHUB_REF_NAME%/*}"
          echo "Submitting $SOURCE_DIR to registry..."
          python3 scripts/submit_to_registry.py "$SOURCE_DIR" --skip-checksum-verify
